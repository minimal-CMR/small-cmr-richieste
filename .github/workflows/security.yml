name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/minimal-cmr/small-cmr-richieste-backend
  BACKEND_PORT: 8003

jobs:
  gitleaks:
    name: GitLeaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner

  trivy-sca:
    name: Trivy SCA (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-sca.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-sca.sarif'
          category: 'trivy-sca'

  container:
    name: Build + Trivy scan + Cosign sign
    runs-on: ubuntu-latest
    needs: [gitleaks, trivy-sca]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ github.sha }}

  owasp-zap:
    name: OWASP ZAP full scan
    runs-on: ubuntu-latest
    needs: [trivy-sca]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start backend (sqlite, background)
        working-directory: backend
        env:
          DATABASE_URL: 'sqlite:///./zap-test.db'
          SECRET_KEY: 'zap-test-secret-do-not-use-in-prod'
          ALGORITHM: 'HS256'
          ACCESS_TOKEN_EXPIRE_MINUTES: '480'
          SERVICE_SECRET: 'zap-test-service-secret'
          ORE_SERVICE_URL: 'http://localhost:8002'
          CORS_ORIGINS: 'http://localhost:3000'
          LOG_DIR: ${{ runner.temp }}/logs
        run: |
          nohup python -m uvicorn main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} > /tmp/uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -sf http://localhost:${{ env.BACKEND_PORT }}/health; then exit 0; fi
            sleep 2
          done
          cat /tmp/uvicorn.log
          exit 1
      - uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:${{ env.BACKEND_PORT }}'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-report-richieste
          cmd_options: '-I -j'
